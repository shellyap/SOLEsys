    <style>
        .a4-fixed { width: 210mm; height: 297mm; min-width: 210mm; min-height: 297mm; background: white; margin: 0 auto; overflow: hidden; position: relative; }
        .a4-auto { width: 210mm; min-width: 210mm; min-height: 297mm; background: white; margin: 0 auto; position: relative; }
        .preview-container { display: flex; justify-content: center; align-items: flex-start; overflow-x: hidden; padding: 20px 0; width: 100%; }
        
        @media print {
            header, aside, .no-print, nav, .preview-toolbar, .btn-action, .mobile-backdrop { display: none !important; }
            body, #root, #root-ui { margin: 0; padding: 0; background: white; }
            main { padding: 0 !important; overflow: visible !important; }
            .a4-fixed, .a4-auto { box-shadow: none !important; margin: 0 !important; border: none !important; width: 210mm !important; }

        const FIREBASE_CONFIG_DATA = {
            apiKey: "AIzaSyDCTebeG42Vj1G9TRIApiLhwfsxng5mP0Y",
            authDomain: "ppkbis-shell.firebaseapp.com",
            projectId: "ppkbis-shell",
            storageBucket: "ppkbis-shell.firebasestorage.app",
            messagingSenderId: "942093342515",
            appId: "1:942093342515:web:29a844b91ba357835a9046",
            measurementId: "G-M5Q9NCD7JF"
        };

        const CATEGORIES_LIST = [
            { id: 'UNIT BAHASA', label: 'Unit Bahasa', color: '#2563eb', text: 'text-blue-600', bg: 'bg-blue-50', border: 'border-blue-600' },
            { id: 'UNIT SAINS MATE', label: 'Unit Sains & Mate', color: '#059669', text: 'text-emerald-600', bg: 'bg-emerald-50', border: 'border-emerald-600' },
            { id: 'UNIT SAINS SOSIAL', label: 'Unit Sains Sosial', color: '#d97706', text: 'text-amber-600', bg: 'bg-amber-50', border: 'border-amber-600' },
            { id: 'UNIT TVET', label: 'Unit TVET', color: '#e11d48', text: 'text-rose-600', bg: 'bg-rose-50', border: 'border-rose-600' },
            { id: 'PENDIDIKAN ISLAM', label: 'Pendidikan Islam', color: '#7c3aed', text: 'text-violet-600', bg: 'bg-violet-50', border: 'border-violet-600' },
            { id: 'PENDIDIKAN KHAS', label: 'Pendidikan Khas', color: '#c026d3', text: 'text-fuchsia-600', bg: 'bg-fuchsia-50', border: 'border-fuchsia-600' },

            { id: 'SUMBER TEKNOLOGI PENDIDIKAN', label: 'Sumber Teknologi Pendidikan', color: '#0891b2', text: 'text-cyan-600', bg: 'bg-cyan-50', border: 'border-cyan-600' },
            { id: 'TIMBALAN_PPD_PEMBELAJARAN', label: 'Timbalan PPD Pembelajaran', color: '#0f172a', text: 'text-slate-900', bg: 'bg-slate-50', border: 'border-slate-900' }

        const DEFAULT_STAFF_DATA = {
            'UNIT BAHASA': ['Roslinah Apin', 'Susan Inow', 'Shellsia Yap'],
            'UNIT SAINS MATE': ['Ahsly bin Kasin', 'Nazarius G. Yulip'],
            'UNIT SAINS SOSIAL': ['Moktar Maulah', 'Asman Bin Saman', 'Alice Aban'],
            'UNIT TVET': ['Lisah binti Kilau@Hamrie', 'Dr. Losius Goliong', 'Kemein Gontol'],
            'PENDIDIKAN ISLAM': ['Suhailin bin Lajimin', 'Azron bin Jaafar@Ramli'],
            'PENDIDIKAN KHAS': ['Siti Zulaikha solubin', 'Dr. Serirama Ebbie'],
            'PEMULIHAN KHAS': ['Wilda Watis', 'Zuraini Gakau', 'Jeyaselvi Suffayah'],
            'SUMBER TEKNOLOGI PENDIDIKAN': ['Eddy@Iskandar bin Ajmain'],
            'TIMBALAN_PPD_PEMBELAJARAN': ['Vincent Sabin @ William']
        };

        const JENIS_TUGAS_OPTIONS = ["KURSUS", "BENGKEL", "TAKILMAT", "MESYUARAT DI LUAR TUGAS RASMI"];

        // --- OFFICER SIGN-OFF LOGIC ---
        const siscUnits = ["Unit Bahasa", "Unit Sains & Mate", "Unit Sains Sosial", "Unit TVET"];

        const getDefaultJawatan = (unitId) => {
            if (unitId === 'TIMBALAN_PPD_PEMBELAJARAN') {
                return "Timbalan Pegawai Pendidikan Daerah Ranau\nSektor Pembelajaran, Pejabat Pendidikan Daerah Ranau";
            }
            const unit = CATEGORIES_LIST.find(c => c.id === unitId);
            if (!unit) return "Pegawai Sektor Pembelajaran";

            const isSISC = siscUnits.includes(unit.label);
            if (isSISC) {
                return `SISC+ ${unit.label}\nSektor Pembelajaran, Pejabat Pendidikan Daerah Ranau`;
            } else {
                return "Pegawai Pendidikan Daerah Ranau";
            }
        };

        const INITIAL_FORM = {
            reportType: 'opr', jenisTugasRasmi: 'KURSUS', namaProgram: '', kategori: 'UNIT BAHASA', disediakanOleh: '', 
            jawatanPenyedia: getDefaultJawatan('UNIT BAHASA'), tarikhDari: '', tarikhHingga: '', tarikhLaporan: '', 
            masaMula: '', masaTamat: '', tempat: '', sasaran: '', aktiviti: '', anjuran: '', 
            rujukanSurat: '', kehadiran: '', pengenalan: '', objektif: '', pengisian: '', catatan: '', penutup: ''
        };

        // --- UTILITIES ---
        const formatDateRange = (d1, d2) => {
            if (!d1) return "-";
            const date1 = new Date(d1);
            const day1 = date1.getDate().toString().padStart(2, '0');
            const month1 = (date1.getMonth() + 1).toString().padStart(2, '0');
            const year1 = date1.getFullYear();
            if (!d2 || d1 === d2) return `${day1}/${month1}/${year1}`;
            const date2 = new Date(d2);
            const day2 = date2.getDate().toString().padStart(2, '0');
            const month2 = (date2.getMonth() + 1).toString().padStart(2, '0');
            const year2 = date2.getFullYear();
            return `${day1}/${month1} - ${day2}/${month2}/${year2}`;
        };

        const formatTimeEng = (timeStr) => {
            if (!timeStr) return "";
            const [h, m] = timeStr.split(':');
            let hour = parseInt(h);
            const ampm = hour >= 12 ? 'PM' : 'AM';
            hour = hour % 12 || 12;
            return `${hour}:${m} ${ampm}`;
        };

        const compressImage = (base64Str) => {
            return new Promise((resolve) => {
                const img = new Image();
                img.src = base64Str;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let width = img.width;
                    let height = img.height;
                    const max = 1200;
                    if (width > height && width > max) { height *= max / width; width = max; }
                    else if (height > max) { width *= max / height; height = max; }
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    resolve(canvas.toDataURL('image/jpeg', 0.7));
                };
            });
        };

        // --- 2. UI COMPONENTS (ICONS) ---
        function IconBase({ size = 24, className = "", children, ...props }) {
            return (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className} {...props}>
                    {children}
                </svg>
            );
        }

        const Icons = {
            Sparkles: (p) => <IconBase {...p}><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1-1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/><path d="M5 3v4"/><path d="M9 5H5"/><path d="M19 19v4"/><path d="M23 21h-4"/></IconBase>,
            Layout: (p) => <IconBase {...p}><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><line x1="3" x2="21" y1="10" y2="10"/><line x1="10" x2="10" y1="21" y2="10"/></IconBase>,
            Flag: (p) => <IconBase {...p}><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" x2="4" y1="22" y2="15"/></IconBase>,
            Library: (p) => <IconBase {...p}><path d="m16 6 4 14"/><path d="M12 6v14"/><path d="M8 8v12"/><path d="M4 4v16"/></IconBase>,
            BarChart2: (p) => <IconBase {...p}><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></IconBase>,
            Settings: (p) => <IconBase {...p}><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65(1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1! 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1-2 2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></IconBase>,
            Camera: (p) => <IconBase {...p}><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></IconBase>,
            Cloud: (p) => <IconBase {...p}><path d="M17.5 19c0-3.037-2.463-5.5-5.5-5.5S6.5 15.963 6.5 19"/><path d="M17.5 19H9"/><path d="M17.5 13.5a5.5 5.5 0 0 1 4.3 8.3"/><path d="M5 19a4 4 0 0 1 0-8c2.4 0 4.3 1.1 5.4 2.8"/></IconBase>,
            ChevronLeft: (p) => <IconBase {...p}><polyline points="15 18 9 12 15 6"/></IconBase>,
            Download: (p) => <IconBase {...p}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></IconBase>,
            Printer: (p) => <IconBase {...p}><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect width="12" height="8" x="6" y="14"/></IconBase>,
            ExternalLink: (p) => <IconBase {...p}><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" x2="21" y1="21" y2="3"/></IconBase>,
            Eye: (p) => <IconBase {...p}><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></IconBase>,
            Edit2: (p) => <IconBase {...p}><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></IconBase>,
            Trash2: (p) => <IconBase {...p}><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></IconBase>,
            School: (p) => <IconBase {...p}><path d="m4 6 8-4 8 4"/><path d="m18 10 4 2v8a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2v-8l4-2"/><path d="M14 22v-4a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v4"/><path d="M18 5v17"/><path d="M6 5v17"/><circle cx="12" cy="9" r="2"/></IconBase>,
            X: (p) => <IconBase {...p}><path d="M18 6 6 18"/><path d="m6 6 12 12"/></IconBase>,
            ChevronDown: (p) => <IconBase {...p}><polyline points="6 9 12 15 18 9"/></IconBase>,

            Trophy: (p) => <IconBase {...p}><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></IconBase>,

        // --- 3. DOCUMENT COMPONENTS ---
        
        function ReportDoc({ data, reportImages, config }) {
            const cat = CATEGORIES_LIST.find(c => c.id === data.kategori) || CATEGORIES_LIST[0];
            return (
                <div className="a4-fixed bg-white text-black shadow-lg opr-page border-[1px] border-slate-200">
                    <div className={`border-[4px] border-double ${cat.border} h-full flex flex-col p-8 overflow-hidden bg-white`}>
                        <div className="flex border-b-2 border-gray-800 pb-3 mb-4 items-center text-center">
                            <div className="w-16 h-16 mr-4 flex items-center justify-center flex-shrink-0">
                                {config.logo ? <img src={config.logo} className="max-w-full max-h-full object-contain" alt="Logo" /> : <Icons.School size={36} />}
                            </div>
                            <div className="flex-grow text-center">
                                <h1 className="text-[13px] font-bold uppercase leading-tight">{config.headerText}</h1>
                                <h2 className={`text-[12px] font-bold uppercase ${cat.text} leading-tight`}>{cat.label}</h2>
                                <h3 className="text-[10px] font-black uppercase text-slate-400 mt-1 leading-tight tracking-widest">ONE PAGE REPORT (OPR)</h3>
                            </div>
                        </div>
                        <div className={`${cat.bg} border ${cat.border} p-3 text-center mb-4 flex-shrink-0 rounded-md`}>
                            <h3 className="text-[12px] font-bold uppercase report-text leading-tight">{data.namaProgram || "Sila Masukkan Tajuk Program"}</h3>
                        </div>
                        <div className="grid grid-cols-2 text-[10px] border-t border-l border-gray-800 mb-4 flex-shrink-0 font-bold uppercase">
                            <div className="border-r border-b border-gray-800 p-2">TARIKH: {formatDateRange(data.tarikhDari, data.tarikhHingga)}</div>
                            <div className="border-r border-b border-gray-800 p-2">TEMPAT: {data.tempat || "-"}</div>
                            <div className="border-r border-b border-gray-800 p-2">MASA: {data.masaMula ? `${formatTimeEng(data.masaMula)} - ${formatTimeEng(data.masaTamat)}` : "-"}</div>
                            <div className="border-r border-b border-gray-800 p-2">SASARAN: {data.sasaran || "-"}</div>
                        </div>
                        <div className="flex-1 flex flex-col space-y-4 min-h-0 overflow-hidden">
                            <div className="border border-gray-800 flex flex-col min-h-0">
                                <div className="bg-gray-100 p-1.5 text-[10px] font-black border-b border-gray-800 uppercase text-center flex-shrink-0">Ringkasan Aktiviti / Bimbingan</div>
                                <div className="p-4 text-[11px] report-text leading-relaxed flex-1 overflow-y-auto scrollbar-hide text-justify">
                                    {data.aktiviti || "- Tiada data dimasukkan -"}
                                </div>
                            </div>
                            <div className="border border-gray-800 flex flex-col flex-grow min-h-0">
                                <div className="bg-gray-100 p-1.5 text-[10px] font-black border-b border-gray-800 text-center uppercase flex-shrink-0">Laporan Bergambar</div>
                                <div className="grid grid-cols-2 grid-rows-2 gap-3 p-3 flex-1 min-h-0 bg-white overflow-hidden">
                                    {[0, 1, 2, 3].map((i) => (
                                        <div key={i} className="border border-slate-100 h-full w-full flex items-center justify-center bg-slate-50 rounded overflow-hidden relative shadow-inner">
                                            {reportImages && reportImages[i] ? (
                                                <img src={reportImages[i]} className="absolute inset-0 w-full h-full object-contain p-1" alt={`Foto ${i+1}`} />
                                            ) : (
                                                <span className="text-[8px] text-slate-300 uppercase font-bold italic">Foto {i+1}</span>
                                            )}
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                        <div className="mt-4 pt-3 border-t border-gray-800 flex justify-end text-[10px] flex-shrink-0">
                            <div className="text-left w-64 uppercase font-bold text-justify">
                                Disediakan Oleh:
                                <div className="border-b border-gray-800 mt-10 mb-1"></div>
                                <span className="text-[11px] block">{data.disediakanOleh}</span>
                                <span className="text-slate-500 font-normal whitespace-pre-wrap block leading-tight">{data.jawatanPenyedia}</span>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        function ExecDoc({ data, reportImages, config }) {
            return (
                <div className="a4-auto bg-white text-black exec-page border-[1px] border-slate-200">
                    <div className="flex flex-col border-[4px] border-double border-gray-800 p-12 bg-white">
                        <div className="flex items-center border-b-2 border-gray-800 pb-5 mb-8">
                            <div className="w-20 h-20 mr-6 flex items-center justify-center flex-shrink-0">
                                {config.logo ? <img src={config.logo} className="max-w-full max-h-full object-contain" alt="Logo" /> : <Icons.School size={48} />}
                            </div>
                            <h1 className="text-xl font-black uppercase text-center flex-grow leading-tight tracking-tight">{config.headerText}</h1>
                        </div>
                        <h2 className="text-center font-black text-sm uppercase mb-10 underline underline-offset-8 leading-relaxed">
                            LAPORAN EKSEKUTIF SELEPAS MENGHADIRI TUGAS RASMI<br/>
                            <span className="text-slate-400">({data.jenisTugasRasmi})</span>
                        </h2>
                        <table className="w-full border-collapse border border-black text-[12px] bg-white text-black mb-10 shadow-sm">
                            <tbody>
                                <tr><td className="border border-black p-4 font-black w-1/3 bg-slate-50 uppercase">1. Tajuk Aktiviti</td><td className="border border-black p-4 uppercase font-bold report-text">{data.namaProgram || "-"}</td></tr>
                                <tr><td className="border border-black p-4 font-black bg-slate-50 uppercase">2. Tarikh</td><td className="border border-black p-4 uppercase">{formatDateRange(data.tarikhDari, data.tarikhHingga)}</td></tr>
                                <tr><td className="border border-black p-4 font-black bg-slate-50 uppercase">3. Masa</td><td className="border border-black p-4 uppercase">{data.masaMula ? `${formatTimeEng(data.masaMula)} - ${formatTimeEng(data.masaTamat)}` : "-"}</td></tr>
                                <tr><td className="border border-black p-4 font-black bg-slate-50 uppercase">4. Tempat</td><td className="border border-black p-4 uppercase report-text">{data.tempat || "-"}</td></tr>
                                <tr><td className="border border-black p-4 font-black bg-slate-50 uppercase">5. Rujukan Surat Panggilan</td><td className="border border-black p-4 uppercase report-text">{data.rujukanSurat || "-"}</td></tr>
                                <tr><td className="border border-black p-4 font-black bg-slate-50 uppercase">6. Anjuran / Urusetia</td><td className="border border-black p-4 uppercase report-text">{data.anjuran || "-"}</td></tr>
                                <tr><td className="border border-black p-4 font-black bg-slate-50 uppercase">7. Kehadiran</td><td className="border border-black p-4 uppercase report-text">{data.kehadiran || "-"}</td></tr>
                                <tr><td className="border border-black p-4 font-black bg-slate-50 align-top uppercase">8. Pengenalan</td><td className="border border-black p-4 report-text align-top text-justify leading-relaxed">{data.pengenalan || "-"}</td></tr>
                                <tr><td className="border border-black p-4 font-black bg-slate-50 align-top uppercase">9. Objektif</td><td className="border border-black p-4 report-text align-top text-justify leading-relaxed">{data.objektif || "-"}</td></tr>
                                <tr><td className="border border-black p-4 font-black bg-slate-50 align-top uppercase">10. Pengisian / Rumusan</td><td className="border border-black p-4 report-text align-top text-justify leading-relaxed">{data.pengisian || "-"}</td></tr>
                                <tr><td className="border border-black p-4 font-black bg-slate-50 align-top uppercase">11. Catatan</td><td className="border border-black p-4 report-text align-top text-justify leading-relaxed">{data.catatan || "-"}</td></tr>
                                <tr><td className="border border-black p-4 font-black bg-slate-50 align-top uppercase">12. Penutup</td><td className="border border-black p-4 report-text align-top text-justify leading-relaxed">{data.penutup || "-"}</td></tr>
                            </tbody>
                        </table>
                        {reportImages && reportImages.some(i => i) && (
                            <div className="space-y-8 mt-10">
                                <div className="bg-slate-900 p-3 font-black uppercase text-center border-2 border-black text-white text-sm rounded shadow-lg">Lampiran Bergambar</div>
                                <div className="grid grid-cols-2 gap-8">
                                    {reportImages.map((img, i) => img ? (
                                        <div key={i} className="img-card border-2 border-slate-100 aspect-video flex items-center justify-center bg-slate-50 overflow-hidden rounded-lg shadow-sm">
                                            <img src={img} className="max-w-full max-h-full object-contain" alt={`Lampiran ${i+1}`} />
                                        </div>
                                    ) : null)}
                                </div>
                            </div>
                        )}
                        <div className="mt-12 pt-10 flex justify-end text-xs uppercase">
                            <div className="text-left w-80">
                                <span className="font-bold">Dilaporkan Oleh:</span>
                                <div className="border-b-2 border-black mt-16 mb-2"></div>
                                <span className="text-[13px] font-black block">{data.disediakanOleh}</span>
                                <span className="text-slate-500 whitespace-pre-wrap block leading-tight">{data.jawatanPenyedia}</span>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        function PreviewMenuComp({ handlePrint, downloadAsJPG, downloadAsPDF, reportType }) {
            return (
                <div className="preview-toolbar no-print flex flex-wrap items-center justify-center gap-2 mb-4 bg-white p-2 rounded-2xl shadow-md border border-slate-100 w-full md:w-auto">
                    <button onClick={downloadAsPDF} title="Download as PDF" className="btn-action p-2 flex flex-col items-center text-slate-600 hover:text-indigo-600 flex-1 md:flex-none">
                        <Icons.Download size={20} />
                        <span className="mt-1 uppercase font-bold text-[7px]">PDF</span>
                    </button>
                    <button onClick={downloadAsJPG} title="Download as Image" className="btn-action p-2 flex flex-col items-center text-slate-600 hover:text-indigo-600 flex-1 md:flex-none">
                        <Icons.Download size={20} />
                        <span className="mt-1 uppercase font-bold text-[7px]">JPG</span>
                    </button>
                    <button onClick={handlePrint} title="Print Document" className="btn-action p-2 flex flex-col items-center text-slate-600 hover:text-indigo-600 flex-1 md:flex-none">
                        <Icons.Printer size={20} />
                        <span className="mt-1 uppercase font-bold text-[7px]">PRINT</span>
                    </button>
                </div>
            );
        }

        // --- 5. MAIN APP COMPONENT ---
        function App() {
            const appId = 'ppkbis-shell';
            const [user, setUser] = useState(null);
            const [activeTab, setActiveTab] = useState('editor'); 
            const [isSidebarOpen, setIsSidebarOpen] = useState(false);
            const [formData, setFormData] = useState({...INITIAL_FORM});
            const [images, setImages] = useState([null, null, null, null]);
            const [reports, setReports] = useState([]);
            const [viewingReport, setViewingReport] = useState(null);
            const [editingId, setEditingId] = useState(null);
            const [isSaving, setIsSaving] = useState(false);
            const [statusMsg, setStatusMsg] = useState(null);
            const [searchQuery, setSearchQuery] = useState('');
            const [previewScaleVal, setPreviewScaleVal] = useState(1);
            
            // Archive Filters
            const [archiveFilterUnit, setArchiveFilterUnit] = useState('ALL');
            const [archiveFilterPerson, setArchiveFilterPerson] = useState('ALL');
            const [archiveFilterType, setArchiveFilterType] = useState('ALL');
            const [archiveFilterYear, setArchiveFilterYear] = useState('ALL');
            const [archiveFilterDateStart, setArchiveFilterDateStart] = useState('');
            const [archiveFilterDateEnd, setArchiveFilterDateEnd] = useState('');
            
            // Analysis Filters
            const [anaFilterUnit, setAnaFilterUnit] = useState('ALL');
            const [anaFilterType, setAnaFilterType] = useState('ALL');
            const [anaFilterPerson, setAnaFilterPerson] = useState('ALL');

            const [sysConfig, setSysConfig] = useState({ 
                logo: null, headerText: 'PEJABAT PENDIDIKAN DAERAH RANAU SEKTOR PEMBELAJARAN', staffData: DEFAULT_STAFF_DATA
            });

            const printAreaRef = useRef(null);
            const containerRef = useRef(null);

            const ALL_STAFF_LIST = useMemo(() => Object.values(sysConfig.staffData).flat().sort(), [sysConfig.staffData]);
            
            useEffect(() => {
                const updateScale = () => {
                    if (containerRef.current) {
                        const containerWidth = containerRef.current.offsetWidth;
                        const targetWidth = 210 * 3.78; 
                        setPreviewScaleVal(containerWidth < targetWidth + 40 ? (containerWidth - 40) / targetWidth : 1);
                    }
                };
                window.addEventListener('resize', updateScale);
                updateScale();
                return () => window.removeEventListener('resize', updateScale);
            }, [activeTab, viewingReport]);

            const filteredReportsSorted = useMemo(() => {
                return reports.filter(r => {
                    const matchSearch = r.namaProgram?.toLowerCase().includes(searchQuery.toLowerCase());
                    const matchUnit = archiveFilterUnit === 'ALL' || r.kategori === archiveFilterUnit;
                    const matchPerson = archiveFilterPerson === 'ALL' || r.disediakanOleh === archiveFilterPerson;
                    const matchType = archiveFilterType === 'ALL' || r.reportType === archiveFilterType;
                    const matchYear = archiveFilterYear === 'ALL' || (r.tarikhDari && r.tarikhDari.startsWith(archiveFilterYear));
                    const matchDateStart = !archiveFilterDateStart || r.tarikhDari >= archiveFilterDateStart;
                    const matchDateEnd = !archiveFilterDateEnd || r.tarikhDari <= archiveFilterDateEnd;
                    return matchSearch && matchUnit && matchPerson && matchType && matchYear && matchDateStart && matchDateEnd;
                });
            }, [reports, archiveFilterUnit, archiveFilterPerson, archiveFilterType, archiveFilterYear, archiveFilterDateStart, archiveFilterDateEnd, searchQuery]);

            const statsData = useMemo(() => {
                const filtered = reports.filter(r => {
                    const matchUnit = anaFilterUnit === 'ALL' || r.kategori === anaFilterUnit;
                    const matchType = anaFilterType === 'ALL' || r.reportType === anaFilterType;
                    const matchPerson = anaFilterPerson === 'ALL' || r.disediakanOleh === anaFilterPerson;
                    return matchUnit && matchType && matchPerson;
                });

                const total = filtered.length;
                const totalOverall = reports.length;
                const oprCount = filtered.filter(r => r.reportType === 'opr').length;
                const execCount = filtered.filter(r => r.reportType === 'eksekutif').length;
                const oprPercent = total > 0 ? (oprCount / total * 100).toFixed(1) : 0;
                const execPercent = total > 0 ? (execCount / total * 100).toFixed(1) : 0;
                const selectedVsTotal = totalOverall > 0 ? (total / totalOverall * 100).toFixed(1) : 0;

                const unitCounts = {};
                CATEGORIES_LIST.forEach(cat => unitCounts[cat.id] = 0);
                filtered.forEach(r => { if(unitCounts[r.kategori] !== undefined) unitCounts[r.kategori]++; });
                
                const unitChartData = CATEGORIES_LIST.map(cat => ({
                    id: cat.id, label: cat.label, count: unitCounts[cat.id],
                    percentage: total > 0 ? (unitCounts[cat.id] / total * 100).toFixed(1) : 0, color: cat.color
                })).sort((a,b) => b.count - a.count);

                const officerStats = {};
                filtered.forEach(r => {
                    if (r.disediakanOleh) {
                        if (!officerStats[r.disediakanOleh]) {
                            officerStats[r.disediakanOleh] = { name: r.disediakanOleh, unit: r.kategori, count: 0, opr: 0, exec: 0 };
                        }
                        officerStats[r.disediakanOleh].count++;
                        if (r.reportType === 'opr') officerStats[r.disediakanOleh].opr++;
                        else officerStats[r.disediakanOleh].exec++;
                    }
                });
                
                const leaderboard = Object.values(officerStats)
                    .sort((a,b) => b.count - a.count)
                    .map((item, index) => ({
                        ...item, rank: index + 1, contribution: total > 0 ? (item.count / total * 100).toFixed(1) : 0
                    }));

                const mostActiveUnit = unitChartData[0]?.count > 0 ? unitChartData[0].label : "N/A";
                const topOfficer = leaderboard[0]?.name || "N/A";
                const uniqueUnitsCount = new Set(filtered.map(r => r.kategori)).size;
                const uniqueOfficersCount = new Set(filtered.map(r => r.disediakanOleh).filter(Boolean)).size;

                return { total, totalOverall, oprCount, execCount, oprPercent, execPercent, selectedVsTotal, unitChartData, leaderboard, mostActiveUnit, topOfficer, uniqueUnitsCount, uniqueOfficersCount };
            }, [reports, anaFilterUnit, anaFilterType, anaFilterPerson]);

            const showStatus = (msg, type = 'success') => { setStatusMsg({ text: msg, type }); setTimeout(() => setStatusMsg(null), 4000); };
            
            const handlePrintAction = () => { 
                const area = printAreaRef.current;
                if (!area) return;
                area.style.display = 'block';
                window.print();
                area.style.display = 'none';
            };

            const handleImageUpload = async (index, e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = async (ev) => {
                        const compressed = await compressImage(ev.target.result);
                        setImages(prev => { const n = [...prev]; n[index] = compressed; return n; }); 
                    };
                    reader.readAsDataURL(file);
                }
            };

            const captureSnapshot = async () => {
                if (!window.html2canvas) return null;
                const area = printAreaRef.current;
                if (!area) return null;

                area.style.display = 'block';
                area.style.position = 'fixed';
                area.style.left = '-9999px';
                area.style.top = '0';
                area.style.width = '210mm';
                
                try {
                    const canvas = await window.html2canvas(area, { 
                        scale: 2, 
                        useCORS: true, 
                        logging: false,
                        windowWidth: area.scrollWidth,
                        windowHeight: area.scrollHeight
                    });
                    area.style.display = 'none';
                    area.style.position = 'absolute';
                    return canvas.toDataURL('image/jpeg', 0.95);
                } catch (e) {
                    area.style.display = 'none';
                    area.style.position = 'absolute';
                    return null;
                }
            };

            const generatePDFBase64 = async () => {
                if (!window.jspdf || !window.html2canvas) return null;
                const area = printAreaRef.current;
                if (!area) return null;

                area.style.display = 'block';
                area.style.position = 'fixed';
                area.style.left = '-9999px';
                area.style.top = '0';
                area.style.width = '210mm';
                
                try {
                    const canvas = await window.html2canvas(area, { 
                        scale: 2, useCORS: true, logging: false,
                        windowWidth: area.scrollWidth, windowHeight: area.scrollHeight
                    });
                    area.style.display = 'none';
                    area.style.position = 'absolute';
                    
                    const { jsPDF } = window.jspdf;
                    const pdf = new jsPDF('p', 'mm', 'a4');
                    const imgData = canvas.toDataURL('image/jpeg', 0.95);
                    const imgWidth = 210, pageHeight = 297, imgHeight = canvas.height * imgWidth / canvas.width;
                    
                    let heightLeft = imgHeight, position = 0;
                    pdf.addImage(imgData, 'JPEG', 0, position, imgWidth, imgHeight);
                    heightLeft -= pageHeight;

                    while (heightLeft >= 0) {
                        position = heightLeft - imgHeight;
                        pdf.addPage();
                        pdf.addImage(imgData, 'JPEG', 0, position, imgWidth, imgHeight);
                        heightLeft -= pageHeight;
                    }
                    return pdf.output('datauristring').split(',')[1];
                } catch (e) { area.style.display = 'none'; return null; }
            };

            const handleDriveUpload = async (pdfBase64) => {
                const dataObj = viewingReport || formData;
                const typeLabel = dataObj.reportType === 'opr' ? 'OPR' : 'EXEC';
                const now = new Date();
                const yyyy = now.getFullYear();
                const mm = String(now.getMonth() + 1).padStart(2, '0');
                const dd = String(now.getDate()).padStart(2, '0');
                const hh = String(now.getHours()).padStart(2, '0');
                const min = String(now.getMinutes()).padStart(2, '0');
                const timestamp = `${yyyy}${mm}${dd}_${hh}${min}`;
                const cleanTitle = (dataObj.namaProgram || "Laporan").replace(/[^a-zA-Z0-9]/g, '');

                const fileName = `${typeLabel}_${cleanTitle}_${timestamp}.pdf`;
                try {
                    await fetch(WEB_APP_URL, {
                        method: "POST",
                        mode: "no-cors",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ fileData: pdfBase64, fileName: fileName, category: dataObj.kategori, staffName: dataObj.disediakanOleh })
                    });
                } catch (e) { console.error("Drive upload failed", e); }
            };

            const downloadAsJPG = async () => {
                const base64 = await captureSnapshot();
                if (!base64) return;
                const link = document.createElement('a');
                link.download = `${(viewingReport || formData).namaProgram || "Laporan"}.jpg`;
                link.href = base64;
                link.click();
                showStatus("Saved successfully");
            };

            const downloadAsPDF = async () => {
                showStatus("Menjana PDF...");
                const pdfBase64 = await generatePDFBase64();
                if (!pdfBase64) return;
                const link = document.createElement('a');
                link.download = `${(viewingReport || formData).namaProgram || "Laporan"}.pdf`;
                link.href = `data:application/pdf;base64,${pdfBase64}`;
                link.click();
                showStatus("Saved successfully");
            };

            const handleSaveReport = async () => {
                if (!formData.namaProgram || !formData.tarikhDari) return showStatus("Tajuk & Tarikh diperlukan!", "error");
                setIsSaving(true);
                try {
                    const db = firebase.firestore();
                    const payload = { ...formData, images, updatedAt: firebase.firestore.FieldValue.serverTimestamp() };
                    if (editingId) { 
                        await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('reports').doc(editingId).update(payload); 
                    } else { 
                        await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('reports').add({ ...payload, createdAt: firebase.firestore.FieldValue.serverTimestamp(), userId: user.uid }); 
                    }
                    
                    const pdfBase64 = await generatePDFBase64();
                    if (pdfBase64) await handleDriveUpload(pdfBase64);
                    
                    showStatus("Saved successfully");
                    setFormData({...INITIAL_FORM}); 
                    setImages([null, null, null, null]); 
                    setEditingId(null);
                    setActiveTab('archive');
                } catch (e) { showStatus("Ralat Simpan", "error"); }
                setIsSaving(false);
            };

            const handleInputChange = (e) => {
                const { name, value } = e.target;
                setFormData(prev => {
                    const next = { ...prev, [name]: value };
                    if (name === 'kategori') { next.jawatanPenyedia = getDefaultJawatan(value); next.disediakanOleh = ''; }
                    return next;
                });
            };

            const handleTabChange = (tab) => {
                setActiveTab(tab); setViewingReport(null); setIsSidebarOpen(false);
                const newType = (tab === 'laporan_eksekutif') ? 'eksekutif' : 'opr';
                setFormData(prev => ({ ...prev, reportType: newType }));
                if (newType === 'opr' && images.length !== 4) setImages([null, null, null, null]);
            };

            const addImageSlot = () => setImages(prev => [...prev, null]);
            const removeImageSlot = (idx) => {
                setImages(prev => {
                    if (formData.reportType === 'opr') { const n = [...prev]; n[idx] = null; return n; }
                    return prev.filter((_, i) => i !== idx);
                });
            };

            const handleEdit = (r) => { 
                setFormData({...r}); 
                setImages(r.images || [null, null, null, null]); 
                setEditingId(r.id); 
                setActiveTab(r.reportType === 'eksekutif' ? 'laporan_eksekutif' : 'editor'); 
                setViewingReport(null); 
            };

            const deleteReport = async (id) => { 
                if (confirm("Padam laporan ini?")) { 
                    try { 
                        await firebase.firestore().collection('artifacts').doc(appId).collection('public').doc('data').collection('reports').doc(id).delete(); 
                        showStatus("Saved successfully"); 
                    } catch (e) { showStatus("Ralat", "error"); } 
                } 
            };

            const updateStaffList = (unitId, newStaffArray) => {
                setSysConfig(prev => ({ ...prev, staffData: { ...prev.staffData, [unitId]: newStaffArray } }));
            };

            useEffect(() => {
                const firebaseApp = firebase.initializeApp(FIREBASE_CONFIG_DATA);
                const auth = firebaseApp.auth();
                auth.onAuthStateChanged(u => {
                    if (u) {
                        setUser(u);
                        const db = firebaseApp.firestore();
                        db.collection('artifacts').doc(appId).collection('public').doc('data').collection('reports').onSnapshot(snap => {
                            const data = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                            setReports(data.sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0)));
                        });
                        db.collection('artifacts').doc(appId).collection('public').doc('data').collection('settings').doc('global_config').onSnapshot(snap => { 
                            if (snap.exists) setSysConfig(prev => ({ ...prev, ...snap.data() })); 
                        });
                    } else { auth.signInAnonymously(); }
                });
            }, []);

            if (!user) return <div className="h-screen w-screen flex flex-col items-center justify-center bg-[#0f172a] text-white"><div className="w-12 h-12 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin mb-4"></div><p className="text-[10px] font-black uppercase tracking-widest text-center">Cloud Synchronizing...</p></div>;

            return (
                <div className="flex flex-col h-screen w-full bg-[#f8fafc] overflow-hidden relative">
                    <header className="md:hidden bg-slate-900 text-white p-4 flex items-center justify-between z-50 shadow-md">
                        <div className="flex items-center gap-2"><Icons.Sparkles size={20} className="text-indigo-400" /><h1 className="text-lg font-black tracking-tighter leading-none">SOLE System</h1></div>
                        <button onClick={() => setIsSidebarOpen(!isSidebarOpen)} className="p-2 bg-slate-800 rounded-lg active:scale-95 transition-transform">{isSidebarOpen ? <Icons.X size={24}/> : <Icons.Menu size={24}/>}</button>
                    </header>

                    <div className="flex flex-1 overflow-hidden">
                        {isSidebarOpen && <div className="fixed inset-0 bg-black/50 z-40 md:hidden backdrop-blur-sm mobile-backdrop" onClick={() => setIsSidebarOpen(false)}></div>}
                        <aside className={`fixed inset-y-0 left-0 z-50 w-64 bg-slate-900 text-slate-300 flex flex-col shadow-2xl transition-transform duration-300 ease-in-out md:relative md:translate-x-0 ${isSidebarOpen ? 'translate-x-0' : '-translate-x-full'}`}>
                            <div className="p-8 bg-slate-950 flex flex-col gap-4 text-center">
                                <div className="mx-auto bg-indigo-600 w-12 h-12 rounded-2xl flex items-center justify-center shadow-lg transform -rotate-3"><Icons.Sparkles size={24} className="text-white" /></div>
                                <h1 className="text-2xl font-black text-white tracking-tighter mt-2 leading-none">SOLE-system</h1>
                                <p className="text-[7px] text-slate-400 font-bold uppercase leading-tight tracking-widest">(SEKTOR PEMBELAJARAN PPD RANAU)</p>
                            </div>
                            <nav className="flex-1 py-6 px-4 space-y-2 overflow-y-auto scrollbar-hide">
                                <button onClick={() => handleTabChange('editor')} className={`w-full flex items-center gap-3 p-4 rounded-xl transition-all text-[11px] font-bold uppercase tracking-wider ${activeTab === 'editor' && !viewingReport ? 'bg-indigo-600 text-white shadow-xl' : 'hover:bg-slate-800'}`}><Icons.Layout size={18}/> OPR</button>
                                <button onClick={() => handleTabChange('laporan_eksekutif')} className={`w-full flex items-center gap-3 p-4 rounded-xl transition-all text-[11px] font-bold uppercase tracking-wider ${activeTab === 'laporan_eksekutif' ? 'bg-indigo-600 text-white shadow-xl' : 'hover:bg-slate-800'}`}><Icons.Flag size={18}/> Executive Report</button>
                                <button onClick={() => handleTabChange('archive')} className={`w-full flex items-center gap-3 p-4 rounded-xl transition-all text-[11px] font-bold uppercase tracking-wider ${activeTab === 'archive' ? 'bg-indigo-600 text-white shadow-xl' : 'hover:bg-slate-800'}`}><Icons.Library size={18}/> Database Archive</button>
                                <button onClick={() => handleTabChange('analisis')} className={`w-full flex items-center gap-3 p-4 rounded-xl transition-all text-[11px] font-bold uppercase tracking-wider ${activeTab === 'analisis' ? 'bg-indigo-600 text-white shadow-xl' : 'hover:bg-slate-800'}`}><Icons.BarChart2 size={18}/> Analysis</button>
                                <div className="pt-8 opacity-20"><div className="h-px bg-slate-700 mx-4"></div></div>
                                <button onClick={() => handleTabChange('settings')} className={`w-full flex items-center gap-3 p-4 rounded-xl transition-all text-[11px] font-bold uppercase tracking-wider ${activeTab === 'settings' ? 'bg-indigo-600 text-white shadow-xl' : 'hover:bg-slate-800'}`}><Icons.Settings size={18}/> System Config</button>
                            </nav>
                            <div className="p-4 bg-slate-950 border-t border-slate-800/50">
                                <p className="text-[9px] font-bold text-slate-500 uppercase text-center tracking-tighter">System Developed By: YapShell</p>
                            </div>
                        </aside>

                        <main className="flex-1 h-full overflow-y-auto bg-[#f8fafc] p-4 sm:p-6 md:p-8 relative" ref={containerRef}>
                            <div className="max-w-6xl mx-auto w-full pb-24">
                                
                                {activeTab === 'analisis' && (
                                    <div className="space-y-6 md:space-y-10 animate-in fade-in slide-in-from-bottom-4 duration-700">
                                        <div className="bg-white p-6 md:p-8 rounded-[2.5rem] shadow-sm border border-slate-100 flex flex-col xl:flex-row justify-between items-start xl:items-center gap-8">
                                            <div className="flex items-center gap-5">
                                                <div className="bg-indigo-600 p-4 rounded-3xl text-white shadow-xl shadow-indigo-100">
                                                    <Icons.BarChart2 size={28} />
                                                </div>
                                                <div>

                                                            </div>
                                                            <div className="flex flex-col gap-2">
                                                                <label className="px-4 py-2 bg-indigo-600 text-white text-[10px] font-black uppercase rounded-xl cursor-pointer hover:bg-indigo-700 transition-colors shadow-lg shadow-indigo-100">
                                                                    Tukar Logo
                                                                    <input type="file" className="hidden" accept="image/*" onChange={(e) => { 
                                                                        const file = e.target.files[0]; 
                                                                        if(file){ 
                                                                            const r = new FileReader(); 
                                                                            r.onload = (ev) => setSysConfig({...sysConfig, logo: ev.target.result}); 
                                                                            r.readAsDataURL(file); 
                                                                        } 
                                                                    }} />
                                                                </label>
                                                                {sysConfig.logo && <button onClick={() => setSysConfig({...sysConfig, logo: null})} className="text-[9px] font-bold text-rose-500 uppercase hover:underline">Padam</button>}
                                                            </div>
                                                        </div>
                                                    </div>

                                                    <div className="space-y-4">
                                                        <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">Teks Kepala Surat (Header)</label>
                                                        <textarea 
                                                            rows="5" 
                                                            value={sysConfig.headerText} 
                                                            onChange={e => setSysConfig({...sysConfig, headerText: e.target.value})} 
                                                            className="w-full bg-slate-50 border border-slate-100 rounded-3xl p-6 font-bold text-xs uppercase outline-none focus:ring-2 ring-indigo-500/10 transition-all"
                                                            placeholder="Masukkan teks header di sini..."
                                                        />
                                                    </div>
                                                </div>

                                                {/* Right Column: Staff Management */}
                                                <div className="space-y-4 bg-slate-50 p-8 rounded-[3rem] border border-slate-100 shadow-inner">
                                                    <div className="flex items-center gap-3 mb-6">
                                                        <div className="bg-indigo-100 p-2 rounded-xl text-indigo-600"><Icons.Users size={20}/></div>
                                                        <h4 className="text-[11px] font-black uppercase tracking-widest">Pengurusan Kakitangan</h4>
                                                    </div>
                                                    
                                                    <div className="space-y-4 max-h-[500px] overflow-y-auto pr-2 scrollbar-hide">
                                                        {CATEGORIES_LIST.map(unit => (
                                                            <div key={unit.id} className="bg-white p-5 rounded-[2rem] border border-slate-100 shadow-sm transition-transform hover:scale-[1.01]">
                                                                <div className="flex items-center gap-2 mb-4">
                                                                    <div className="w-2 h-2 rounded-full" style={{ backgroundColor: unit.color }}></div>
                                                                    <p className="text-[9px] font-black text-slate-500 uppercase tracking-tight">{unit.label}</p>
                                                                </div>
                                                                <div className="space-y-2">
                                                                    {(sysConfig.staffData[unit.id] || []).map((name, idx) => (
                                                                        <div key={idx} className="flex justify-between items-center bg-slate-50 px-4 py-2 rounded-xl group border border-transparent hover:border-indigo-100 transition-all">
                                                                            <span className="text-[10px] font-bold text-slate-700">{name}</span>
                                                                            <button 
                                                                                onClick={() => { 
                                                                                    const newList = sysConfig.staffData[unit.id].filter((_, i) => i !== idx); 
                                                                                    updateStaffList(unit.id, newList); 
                                                                                }} 
                                                                                className="p-1 text-rose-300 hover:text-rose-500 transition-colors"
                                                                            >
                                                                                <Icons.Trash size={14}/>
                                                                            </button>
                                                                        </div>
                                                                    ))}
                                                                    <div className="pt-3 flex gap-2">
                                                                        <input 
                                                                            type="text" 
                                                                            placeholder="Nama baru..." 
                                                                            id={`add-staff-${unit.id}`} 
                                                                            className="flex-grow bg-slate-50 border border-slate-200 rounded-xl px-4 py-2 text-[10px] font-bold outline-none focus:border-indigo-400 transition-all" 
                                                                        />
                                                                        <button 
                                                                            onClick={() => { 
                                                                                const input = document.getElementById(`add-staff-${unit.id}`); 
                                                                                if(input.value.trim()){ 
                                                                                    const newList = [...(sysConfig.staffData[unit.id] || []), input.value.trim()]; 
                                                                                    updateStaffList(unit.id, newList); 
                                                                                    input.value = ''; 
                                                                                } 
                                                                            }} 
                                                                            className="bg-indigo-600 text-white p-2 rounded-xl active:scale-90 transition-transform shadow-lg shadow-indigo-100"
                                                                        >
                                                                            <Icons.Plus size={16}/>
                                                                        </button>
                                                                    </div>
                                                                </div>
                                                            </div>
                                                        ))}
                                                    </div>
                                                </div>
                                            </div>

                                            <button 
                                                onClick={async () => { 
                                                    const db = firebase.firestore();
                                                    const configDoc = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('settings').doc('global_config'); 
                                                    await configDoc.set(sysConfig); 
                                                    showStatus("Saved successfully"); 
                                                }} 
                                                className="w-full mt-10 py-5 bg-indigo-600 text-white rounded-3xl font-black text-xs uppercase tracking-widest shadow-xl shadow-indigo-100 hover:bg-indigo-700 transition-all active:scale-95"
                                            >
                                                Kemas Kini Tetapan Sistem
                                            </button>
                                        </div>
                                    </div>
                                )}
                            </div>
                        </main>
                    </div>

                    <div id="print-area" ref={printAreaRef}>
                        {(viewingReport || formData).reportType === 'eksekutif' ? (
                            <ExecDoc data={viewingReport || formData} reportImages={viewingReport ? viewingReport.images : images} config={sysConfig} />
                        ) : (
                            <ReportDoc data={viewingReport || formData} reportImages={(viewingReport ? viewingReport.images : images).slice(0, 4)} config={sysConfig} />
                        )}
                    </div>

                    {statusMsg && <div className={`fixed bottom-6 right-4 left-4 sm:left-auto sm:right-10 z-[100] flex items-center justify-center sm:justify-start px-8 py-4 rounded-full shadow-2xl border backdrop-blur-xl animate-in fade-in slide-in-from-bottom-4 duration-300 ${statusMsg.type === 'error' ? 'bg-rose-50 border-rose-200 text-rose-800' : 'bg-emerald-50 border-emerald-200 text-emerald-800'}`}><span className="font-black text-[10px] uppercase tracking-widest text-center">{statusMsg.text}</span></div>}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
