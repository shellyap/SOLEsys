            initializeApp, getAuth, onAuthStateChanged, signInAnonymously,

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-font-smoothing: antialiased; margin: 0; padding: 0; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        
        @media print {
            @page { size: A4 portrait; margin: 0; }
            html, body { height: auto !important; overflow: visible !important; background: white !important; margin: 0 !important; padding: 0 !important; width: 210mm !important; }
            #root-ui { display: none !important; }
            #print-area {
                display: block !important;
                visibility: visible !important;
                position: absolute !important;
                left: 0 !important; top: 0 !important;
                width: 210mm !important;
                background: white !important;
                z-index: 99999 !important;
                opacity: 1 !important;
            }
            .a4-fixed { height: 297mm !important; width: 210mm !important; border: none !important; box-shadow: none !important; margin: 0 !important; page-break-after: always; overflow: hidden !important; transform: none !important; }
            
            .a4-auto { 
                width: 210mm !important; 
                height: auto !important; 
                min-height: 297mm !important; 
                border: none !important; 
                box-shadow: none !important; 
                margin: 0 !important; 
                padding: 15mm !important;
                display: block !important;
                transform: none !important; 
            }
            
            table { page-break-inside: auto; width: 100% !important; border-collapse: collapse; }
            tr { page-break-inside: avoid; page-break-after: auto; }
            .img-card { page-break-inside: avoid; margin-bottom: 15px; }
            h1, h2, .bg-gray-100 { page-break-after: avoid; }
        }

        .preview-container {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            width: 100%;
            overflow: hidden;
            padding: 20px 0;
        }

        /* OPR Fixed Size */
        .a4-fixed { width: 210mm; height: 297mm; padding: 10mm; background: white; flex-shrink: 0; overflow: hidden; display: flex; flex-direction: column; box-sizing: border-box; position: relative; box-shadow: 0 10px 40px rgba(0,0,0,0.1); transform-origin: top center; }
        
        /* Executive Auto Size */
        .a4-auto { width: 210mm; min-height: 297mm; height: auto; padding: 15mm; background: white; flex-shrink: 0; display: flex; flex-direction: column; box-sizing: border-box; position: relative; box-shadow: 0 10px 40px rgba(0,0,0,0.1); transform-origin: top center; }
        
        #print-area { display: none; }

        .btn-action { 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            color: white; font-weight: 800; border-radius: 12px; transition: all 0.2s; 
            cursor: pointer; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); 
        }
        
        .btn-action:hover { transform: translateY(-2px); filter: brightness(1.05); }
        .btn-action-square { width: 50px; height: 50px; font-size: 0.55rem; }
        .btn-action-pdf { background-color: #e93e5a; }
        .btn-action-jpg { background-color: #7a66f2; }
        .btn-action-print { background-color: #333e50; }

        .chart-bar-anim { transition: height 1s cubic-bezier(0.4, 0, 0.2, 1); }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 768px) {
            .mobile-hide { display: none; }
            .sidebar-open { transform: translateX(0); }
            .sidebar-closed { transform: translateX(-100%); }
        }
    </style>
</head>
<body class="bg-[#f1f5f9] h-screen overflow-hidden">

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        // --- 1. CONFIG & DATA (DECLARED FIRST) ---
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwLBiRsSEHdmLxDHBmmNneaDxDGIQVgWboBd1dcEIxmSZnCMsZzyg66k9TGhtWYleLJ/exec";

        const FIREBASE_CONFIG_DATA = {
            apiKey: "AIzaSyDCTebeG42Vj1G9TRIApiLhwfsxng5mP0Y",
            authDomain: "ppkbis-shell.firebaseapp.com",
            projectId: "ppkbis-shell",
            storageBucket: "ppkbis-shell.firebasestorage.app",
            messagingSenderId: "942093342515",
            appId: "1:942093342515:web:29a844b91ba357835a9046",
            measurementId: "G-M5Q9NCD7JF"
        };

        const CATEGORIES_LIST = [
            { id: 'UNIT BAHASA', label: 'Unit Bahasa', color: '#2563eb', text: 'text-blue-600', bg: 'bg-blue-50', border: 'border-blue-600' },
            { id: 'UNIT SAINS MATE', label: 'Unit Sains & Mate', color: '#059669', text: 'text-emerald-600', bg: 'bg-emerald-50', border: 'border-emerald-600' },
            { id: 'UNIT SAINS SOSIAL', label: 'Unit Sains Sosial', color: '#d97706', text: 'text-amber-600', bg: 'bg-amber-50', border: 'border-amber-600' },
            { id: 'UNIT TVET', label: 'Unit TVET', color: '#e11d48', text: 'text-rose-600', bg: 'bg-rose-50', border: 'border-rose-600' },
            { id: 'PENDIDIKAN ISLAM', label: 'Pendidikan Islam', color: '#7c3aed', text: 'text-violet-600', bg: 'bg-violet-50', border: 'border-violet-600' },
            { id: 'PENDIDIKAN KHAS', label: 'Pendidikan Khas', color: '#c026d3', text: 'text-fuchsia-600', bg: 'bg-fuchsia-50', border: 'border-fuchsia-600' },
            { id: 'PEMULIHAN KHAS', label: 'Pemulihan Khas', color: '#db2777', text: 'text-pink-600', bg: 'bg-pink-50', border: 'border-pink-600' },
            { id: 'SUMBER TEKNOLOGI PENDIDIKAN', label: 'Sumber Teknologi Pendidikan', color: '#0891b2', text: 'text-cyan-600', bg: 'bg-cyan-50', border: 'border-cyan-600' }
        ];

        const DEFAULT_STAFF_DATA = {
            'UNIT BAHASA': ['Roslinah Apin', 'Susan Inow', 'Shellsia Yap'],
            'UNIT SAINS MATE': ['Ahsly bin Kasin', 'Nazarius G. Yulip'],
            'UNIT SAINS SOSIAL': ['Moktar Maulah', 'Asman Bin Saman', 'Alice Aban'],
            'UNIT TVET': ['Lisah binti Kilau@Hamrie', 'Dr. Losius Goliong', 'Kemein Gontol'],
            'PENDIDIKAN ISLAM': ['Suhailin bin Lajimin', 'Azron bin Jaafar@Ramli'],
            'PENDIDIKAN KHAS': ['Siti Zulaikha solubin', 'Dr. Serirama Ebbie'],
            'PEMULIHAN KHAS': ['Wilda Watis', 'Zuraini Gakau', 'Jeyaselvi Suffayah'],
            'SUMBER TEKNOLOGI PENDIDIKAN': ['Eddy@Iskandar bin Ajmain']
        };

        const JENIS_TUGAS_OPTIONS = ["KURSUS", "BENGKEL", "TAKILMAT", "MESYUARAT DI LUAR TUGAS RASMI"];

        // --- 2. HELPER FUNCTIONS ---
        function getDefaultJawatan(cid) {
            const cat = CATEGORIES_LIST.find(c => c.id === cid);
            if (!cat) return '';
            const isPP = ['PENDIDIKAN ISLAM', 'PENDIDIKAN KHAS', 'PEMULIHAN KHAS', 'SUMBER TEKNOLOGI PENDIDIKAN'].includes(cid);
            return isPP ? `PENOLONG PEGAWAI PENDIDIKAN (${cat.label.toUpperCase()})` : `SISC+ ${cat.label.toUpperCase()}`;
        }

        const formatDateRange = (d1, d2) => {
            const f1 = d1 ? d1.split('-').reverse().join('/') : '';
            const f2 = d2 ? d2.split('-').reverse().join('/') : '';
            return (f1 && f2 && f1 !== f2) ? `${f1} - ${f2}` : (f1 || f2 || "-");
        };

        const formatTimeEng = (t) => {
            if (!t) return '';
            const [h, m] = t.split(':'), hour = parseInt(h);
            const ampm = hour >= 12 ? 'PM' : 'AM';
            return `${hour % 12 || 12}:${m} ${ampm}`;
        };

        const compressImage = (base64Str, maxWidth = 800, quality = 0.6) => {
            return new Promise((resolve) => {
                const img = new Image();
                img.src = base64Str;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let width = img.width;
                    let height = img.height;
                    if (width > maxWidth) {
                        height = (maxWidth / width) * height;
                        width = maxWidth;
                    }
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    resolve(canvas.toDataURL('image/jpeg', quality));
                };
            });
        };

        const INITIAL_FORM = {
            reportType: 'opr', jenisTugasRasmi: 'KURSUS', namaProgram: '', kategori: 'UNIT BAHASA', disediakanOleh: '', 
            jawatanPenyedia: getDefaultJawatan('UNIT BAHASA'), tarikhDari: '', tarikhHingga: '', tarikhLaporan: '', 
            masaMula: '', masaTamat: '', tempat: '', sasaran: '', aktiviti: '', anjuran: '', 
            rujukanSurat: '', kehadiran: '', pengenalan: '', objektif: '', pengisian: '', catatan: '', penutup: ''
        };

        // --- 3. UI COMPONENTS (DEFINED EARLY) ---
        const IconBase = ({ size = 24, className = "", children, ...props }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className} {...props}>
                {children}
            </svg>
        );

        const Icons = {
            Sparkles: (p) => <IconBase {...p}><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1-1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/><path d="M5 3v4"/><path d="M9 5H5"/><path d="M19 19v4"/><path d="M23 21h-4"/></IconBase>,
            Layout: (p) => <IconBase {...p}><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><line x1="3" x2="21" y1="10" y2="10"/><line x1="10" x2="10" y1="21" y2="10"/></IconBase>,
            Flag: (p) => <IconBase {...p}><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" x2="4" y1="22" y2="15"/></IconBase>,
            Library: (p) => <IconBase {...p}><path d="m16 6 4 14"/><path d="M12 6v14"/><path d="M8 8v12"/><path d="M4 4v16"/></IconBase>,
            BarChart2: (p) => <IconBase {...p}><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></IconBase>,
            Settings: (p) => <IconBase {...p}><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1! 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1-2 2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></IconBase>,
            Camera: (p) => <IconBase {...p}><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></IconBase>,
            Cloud: (p) => <IconBase {...p}><path d="M17.5 19c0-3.037-2.463-5.5-5.5-5.5S6.5 15.963 6.5 19"/><path d="M17.5 19H9"/><path d="M17.5 13.5a5.5 5.5 0 0 1 4.3 8.3"/><path d="M5 19a4 4 0 0 1 0-8c2.4 0 4.3 1.1 5.4 2.8"/></IconBase>,
            ChevronLeft: (p) => <IconBase {...p}><polyline points="15 18 9 12 15 6"/></IconBase>,
            Download: (p) => <IconBase {...p}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></IconBase>,
            Printer: (p) => <IconBase {...p}><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect width="12" height="8" x="6" y="14"/></IconBase>,
            ExternalLink: (p) => <IconBase {...p}><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" x2="21" y1="21" y2="3"/></IconBase>,
            Eye: (p) => <IconBase {...p}><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></IconBase>,
            Edit2: (p) => <IconBase {...p}><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></IconBase>,
            Trash2: (p) => <IconBase {...p}><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></IconBase>,
            School: (p) => <IconBase {...p}><path d="m4 6 8-4 8 4"/><path d="m18 10 4 2v8a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2v-8l4-2"/><path d="M14 22v-4a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v4"/><path d="M18 5v17"/><path d="M6 5v17"/><circle cx="12" cy="9" r="2"/></IconBase>,
            X: (p) => <IconBase {...p}><path d="M18 6 6 18"/><path d="m6 6 12 12"/></IconBase>,
            ChevronDown: (p) => <IconBase {...p}><polyline points="6 9 12 15 18 9"/></IconBase>,
            Plus: (p) => <IconBase {...p}><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></IconBase>,
            Users: (p) => <IconBase {...p}><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></IconBase>,
            Trash: (p) => <IconBase {...p}><path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></IconBase>,
            Menu: (p) => <IconBase {...p}><line x1="3" x2="21" y1="12" y2="12"/><line x1="3" x2="21" y1="6" y2="6"/><line x1="3" x2="21" y1="18" y2="18"/></IconBase>
        };

        const { Sparkles, Layout, Flag, Library, BarChart2, Settings, Camera, Cloud, ChevronLeft, Download, Printer, ExternalLink, Eye, Edit2, Trash2, School, X, Plus, Users, Trash, ChevronDown, Menu } = Icons;

        const ReportDoc = ({ data, reportImages, config }) => {
            const cat = CATEGORIES_LIST.find(c => c.id === data.kategori) || CATEGORIES_LIST[0];
            return (
                <div className="a4-fixed bg-white text-black shadow-lg">
                    <div className={`border-[3px] border-double ${cat.border} h-full flex flex-col p-6 overflow-hidden bg-white`}>
                        <div className="flex border-b-2 border-gray-800 pb-2 mb-3 items-center text-center">
                            <div className="w-16 h-16 mr-4 flex items-center justify-center">{config.logo ? <img src={config.logo} className="max-w-full max-h-full object-contain" /> : <School size={36} />}</div>
                            <div className="flex-grow text-center">
                                <h1 className="text-sm font-bold uppercase tracking-tight leading-tight">{config.headerText}</h1>
                                <h2 className={`text-xs font-bold uppercase ${cat.text} leading-tight`}>{cat.label}</h2>
                                <h3 className="text-[10px] font-black uppercase text-slate-400 mt-0.5 leading-tight">ONE PAGE REPORT (OPR)</h3>
                            </div>
                        </div>
                        <div className={`${cat.bg} border ${cat.border} p-2 text-center mb-3 flex-shrink-0 rounded`}>
                            <h3 className="text-sm font-bold uppercase break-words leading-tight">{data.namaProgram || "Tiada Tajuk"}</h3>
                        </div>
                        <div className="grid grid-cols-2 text-[10px] border-t border-l border-gray-800 mb-3 flex-shrink-0">
                            <div className="border-r border-b border-gray-800 p-2 uppercase tracking-tighter font-semibold">TARIKH: {formatDateRange(data.tarikhDari, data.tarikhHingga)}</div>

                            <div className="border-r border-b border-gray-800 p-2 uppercase tracking-tighter font-semibold">MASA: {data.masaMula ? `${formatTimeEng(data.masaMula)} - ${formatTimeEng(data.masaTamat)}` : "-"}</div>
                            <div className="border-r border-b border-gray-800 p-2 uppercase tracking-tighter font-semibold">SASARAN: {data.sasaran || "-"}</div>
                        </div>
                        <div className="flex-grow flex flex-col space-y-3 overflow-hidden min-h-0">

                                <div className="grid grid-cols-2 grid-rows-2 gap-2 p-2 flex-grow overflow-hidden bg-white">
                                    {(reportImages || [null,null,null,null]).slice(0, 4).map((img, i) => (
                                        <div key={i} className="border border-gray-100 h-full w-full flex items-center justify-center bg-gray-50 overflow-hidden relative rounded-sm">
                                            {img ? <img src={img} className="absolute inset-0 w-full h-full object-cover" /> : <span className="text-[8px] text-slate-300 uppercase italic text-center">TIADA FOTO {i+1}</span>}
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                        <div className="mt-4 pt-2 border-t border-gray-800 flex justify-end text-[10px] flex-shrink-0">
                            <div className="text-left w-56 uppercase">Disediakan Oleh:<div className="border-b border-gray-800 mt-8 mb-1"></div><span className="font-bold">{data.disediakanOleh}</span><br/>{data.jawatanPenyedia}</div>
                        </div>
                    </div>
                </div>
            );
        };

        const ExecDoc = ({ data, reportImages, config }) => (
            <div className="a4-auto bg-white text-black font-sans">
                <div className="flex flex-col border-[4px] border-double border-gray-800 p-10 h-full bg-white">
                    <div className="flex items-center border-b-2 border-gray-800 pb-5 mb-8">
                        <div className="w-20 h-20 mr-6 flex items-center justify-center">{config.logo ? <img src={config.logo} className="max-w-full max-h-full object-contain" /> : <School size={48} />}</div>
                        <h1 className="text-xl font-bold uppercase text-center flex-grow leading-tight tracking-tight">{config.headerText}</h1>
                    </div>
                    <h2 className="text-center font-bold text-sm uppercase mb-8 underline underline-offset-4 leading-relaxed">LAPORAN EKSEKUTIF SELEPAS MENGHADIRI TUGAS RASMI<br/>({data.jenisTugasRasmi})</h2>
                    <table className="w-full border-collapse border border-black text-[11px] bg-white text-black mb-8">
                        <tbody>
                            <tr><td className="border border-black p-3 font-bold w-1/3 bg-gray-50 uppercase">1. Tajuk Aktiviti</td><td className="border border-black p-3 uppercase font-semibold">{data.namaProgram || "-"}</td></tr>
                            <tr><td className="border border-black p-3 font-bold bg-gray-50 uppercase">2. Tarikh</td><td className="border border-black p-3 uppercase">{formatDateRange(data.tarikhDari, data.tarikhHingga)}</td></tr>
                            <tr><td className="border border-black p-3 font-bold bg-gray-50 uppercase">3. Masa</td><td className="border border-black p-3 uppercase">{data.masaMula ? `${formatTimeEng(data.masaMula)} - ${formatTimeEng(data.masaTamat)}` : "-"}</td></tr>
                            <tr><td className="border border-black p-3 font-bold bg-gray-50 uppercase">4. Tempat</td><td className="border border-black p-3 uppercase">{data.tempat || "-"}</td></tr>
                            <tr><td className="border border-black p-3 font-bold bg-gray-50 uppercase">5. Rujukan Surat Panggilan</td><td className="border border-black p-3 uppercase">{data.rujukanSurat || "-"}</td></tr>
                            <tr><td className="border border-black p-3 font-bold bg-gray-50 uppercase">6. Anjuran / Urusetia</td><td className="border border-black p-3 uppercase">{data.anjuran || "-"}</td></tr>
                            <tr><td className="border border-black p-3 font-bold bg-gray-50 uppercase">7. Kehadiran / Dihadiri Oleh</td><td className="border border-black p-3 uppercase whitespace-pre-wrap">{data.kehadiran || "-"}</td></tr>
                            <tr><td className="border border-black p-3 font-bold bg-gray-50 align-top uppercase">8. Pengenalan</td><td className="border border-black p-3 whitespace-pre-wrap align-top text-justify leading-relaxed">{data.pengenalan || "-"}</td></tr>
                            <tr><td className="border border-black p-3 font-bold bg-gray-50 align-top uppercase">9. Objektif</td><td className="border border-black p-3 whitespace-pre-wrap align-top text-justify leading-relaxed">{data.objektif || "-"}</td></tr>
                            <tr><td className="border border-black p-3 font-bold bg-gray-50 align-top uppercase">10. Pengisian / Rumusan</td><td className="border border-black p-3 whitespace-pre-wrap align-top text-justify leading-relaxed">{data.pengisian || "-"}</td></tr>
                            <tr><td className="border border-black p-3 font-bold bg-gray-50 align-top uppercase">11. Catatan</td><td className="border border-black p-3 whitespace-pre-wrap align-top text-justify leading-relaxed">{data.catatan || "-"}</td></tr>
                            <tr><td className="border border-black p-3 font-bold bg-gray-50 align-top uppercase">12. Penutup</td><td className="border border-black p-3 whitespace-pre-wrap align-top text-justify leading-relaxed">{data.penutup || "-"}</td></tr>
                        </tbody>
                    </table>
                    {reportImages && reportImages.some(i => i) && (
                        <div className="space-y-6">
                            <div className="bg-gray-100 p-2 font-bold uppercase text-center border-2 border-black">Lampiran Bergambar</div>
                            <div className="grid grid-cols-2 gap-8">
                                {reportImages.map((img, i) => img ? (
                                    <div key={i} className="img-card border border-gray-300 aspect-video flex items-center justify-center bg-gray-50 overflow-hidden rounded shadow-sm">
                                        <img src={img} className="max-w-full max-h-full object-contain" />
                                    </div>
                                ) : null)}
                            </div>
                        </div>
                    )}
                    <div className="mt-12 flex justify-end text-xs uppercase">
                        <div className="text-left w-72">
                            Prepared By:
                            <div className="border-b-2 border-black mt-12 mb-1"></div>
                            <span className="font-bold">{data.disediakanOleh}</span><br/>{data.jawatanPenyedia}
                        </div>
                    </div>
                </div>
            </div>
        );

        const PreviewMenuComp = ({ handlePrint, downloadAsJPG, downloadAsPDF, reportType }) => (
            <div className="preview-toolbar no-print flex items-center justify-center gap-2 mb-4 bg-white p-2 rounded-2xl shadow-md border border-slate-100">
                <button onClick={reportType === 'eksekutif' ? downloadAsPDF : handlePrint} title="Download as PDF/Print" className="btn-action btn-action-square btn-action-pdf">
                    <Download size={20} />
                    <span className="mt-1 uppercase font-bold text-[7px]">PDF</span>
                </button>
                <button onClick={downloadAsJPG} title="Download as Image" className="btn-action btn-action-square btn-action-jpg">
                    <Download size={20} />
                    <span className="mt-1 uppercase font-bold text-[7px]">JPG</span>
                </button>
                <button onClick={handlePrint} title="Print Document" className="btn-action btn-action-square btn-action-print">
                    <Printer size={20} />
                    <span className="mt-1 uppercase font-bold text-[7px]">PRINT</span>
                </button>
            </div>
        );

        // --- 4. MAIN APP COMPONENT ---
        function App() {
            const [user, setUser] = useState(null);
            const [db, setDb] = useState(null);
            const [activeTab, setActiveTab] = useState('editor'); 
            const [isDbConnecting, setIsDbConnecting] = useState(true);
            const [isSidebarOpen, setIsSidebarOpen] = useState(false);
            
            const [formData, setFormData] = useState({...INITIAL_FORM});
            const [images, setImages] = useState([null, null, null, null]);
            const [reports, setReports] = useState([]);
            const [viewingReport, setViewingReport] = useState(null);
            const [editingId, setEditingId] = useState(null);
            const [isSaving, setIsSaving] = useState(false);
            const [statusMsg, setStatusMsg] = useState(null);
            
            const [searchQuery, setSearchQuery] = useState('');
            const [archiveFilterUnit, setArchiveFilterUnit] = useState('ALL');
            const [archiveFilterPerson, setArchiveFilterPerson] = useState('ALL');
            const [archiveFilterType, setArchiveFilterType] = useState('ALL');
            const [archiveFilterYear, setArchiveFilterYear] = useState('ALL');
            const [archiveFilterDateStart, setArchiveFilterDateStart] = useState('');
            const [archiveFilterDateEnd, setArchiveFilterDateEnd] = useState('');
            
            const [anaFilterUnit, setAnaFilterUnit] = useState('ALL');
            const [anaFilterType, setAnaFilterType] = useState('ALL');
            const [anaFilterPerson, setAnaFilterPerson] = useState('ALL');

            const [sysConfig, setSysConfig] = useState({ 
                logo: null, 
                headerText: 'PEJABAT PENDIDIKAN DAERAH RANAU SEKTOR PEMBELAJARAN',
                staffData: DEFAULT_STAFF_DATA
            });

            // Dynamic scaling for mobile preview
            const [previewScale, setPreviewScale] = useState(1);
            const containerRef = useRef(null);

            useEffect(() => {
                const handleResize = () => {
                    if (containerRef.current) {
                        const containerWidth = containerRef.current.offsetWidth;
                        const targetWidth = 210 * 3.78; 
                        if (containerWidth < targetWidth + 40) {
                            setPreviewScale((containerWidth - 40) / targetWidth);
                        } else {
                            setPreviewScale(1);
                        }
                    }
                };
                window.addEventListener('resize', handleResize);
                handleResize();
                return () => window.removeEventListener('resize', handleResize);
            }, [activeTab, viewingReport]);

            const appId = typeof __app_id !== 'undefined' ? __app_id : 'ppkbis-shell';

            const ALL_STAFF_LIST = useMemo(() => {
                return Object.values(sysConfig.staffData).flat().sort();
            }, [sysConfig.staffData]);

            // Robust Firebase Initialization
            useEffect(() => {
                const initFirebase = async () => {
                    if (window.FirebaseReady) {
                        try {
                            const { initializeApp, getAuth, signInAnonymously, signInWithCustomToken, getFirestore, onAuthStateChanged } = window.FirebaseReady;
                            const config = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : FIREBASE_CONFIG_DATA;
                            const app = initializeApp(config);
                            const auth = getAuth(app);
                            const firestore = getFirestore(app);
                            setDb(firestore);

                            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                                await signInWithCustomToken(auth, __initial_auth_token);
                            } else {
                                await signInAnonymously(auth);
                            }

                            const unsubscribe = onAuthStateChanged(auth, (u) => {
                                if (u) {
                                    setUser(u);
                                    setIsDbConnecting(false);
                                }
                            });
                            return unsubscribe;
                        } catch (err) {
                            console.error("Firebase Sync Error:", err);
                            setIsDbConnecting(false);
                        }
                    }
                };
                const interval = setInterval(() => { if (window.FirebaseReady) { clearInterval(interval); initFirebase(); } }, 150);
                return () => clearInterval(interval);
            }, []);

            // Data Fetching
            useEffect(() => {
                if (!user || !db) return;
                const { collection, onSnapshot, doc } = window.FirebaseReady;
                const reportsCol = collection(db, 'artifacts', appId, 'public', 'data', 'reports');
                const unsubReports = onSnapshot(reportsCol, (snap) => {
                    const data = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    setReports(data.sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0)));
                }, (err) => console.error("Firestore Permission Error:", err));
                
                const settingsDoc = doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'global_config');
                const unsubSettings = onSnapshot(settingsDoc, (snap) => { 
                    if (snap.exists()) {
                        const cloudConfig = snap.data();
                        setSysConfig(prev => ({
                            ...prev,
                            ...cloudConfig,
                            staffData: cloudConfig.staffData || DEFAULT_STAFF_DATA
                        }));
                    }
                }, (err) => console.error("Settings Error:", err));
                return () => { unsubReports(); unsubSettings(); };
            }, [user, db, appId]);

            const showStatus = (msg, type = 'success') => { setStatusMsg({ text: msg, type }); setTimeout(() => setStatusMsg(null), 4000); };
            
            const handlePrintAction = () => { showStatus("Menyediakan dokumen..."); setTimeout(() => { window.print(); }, 700); };

            const downloadAsJPG = async () => {
                if (!window.html2canvas) return;
                try {
                    const area = document.getElementById('print-area');
                    area.style.display = 'block';
                    area.style.position = 'fixed';
                    area.style.left = '0'; area.style.top = '0';
                    area.style.opacity = '1'; area.style.zIndex = '99999';
                    area.style.backgroundColor = '#ffffff';

                    const canvas = await window.html2canvas(area, { scale: 2.5, useCORS: true, backgroundColor: "#ffffff" });
                    area.style.display = 'none';
                    const link = document.createElement('a');
                    link.download = `${(viewingReport || formData).namaProgram || "Laporan"}_SOLE.jpg`;
                    link.href = canvas.toDataURL('image/jpeg', 0.95);
                    link.click();
                    showStatus("Imej JPG dimuat turun");
                } catch (e) { showStatus("Ralat JPG", "error"); }
            };

            // ✅ MULTI-PAGE PDF EXPORT (Specially for Executive Report)
            const downloadAsPDF = async () => {
                if (!window.html2canvas || !window.jspdf) return;
                showStatus("Menyediakan PDF berbilang halaman...");
                try {
                    const area = document.getElementById('print-area');
                    area.style.display = 'block';
                    area.style.position = 'fixed';
                    area.style.left = '0'; area.style.top = '0';
                    area.style.opacity = '1'; area.style.zIndex = '99999';
                    area.style.backgroundColor = '#ffffff';

                    const canvas = await window.html2canvas(area, { scale: 2, useCORS: true, backgroundColor: "#ffffff" });
                    area.style.display = 'none';

                    const imgData = canvas.toDataURL('image/jpeg', 0.9);
                    const { jsPDF } = window.jspdf;
                    const pdf = new jsPDF('p', 'mm', 'a4');
                    const imgWidth = 210;
                    const pageHeight = 295; // A4 height approx
                    const imgHeight = (canvas.height * imgWidth) / canvas.width;
                    let heightLeft = imgHeight;
                    let position = 0;

                    pdf.addImage(imgData, 'JPEG', 0, position, imgWidth, imgHeight);
                    heightLeft -= pageHeight;

                    while (heightLeft >= 0) {
                        position = heightLeft - imgHeight;
                        pdf.addPage();
                        pdf.addImage(imgData, 'JPEG', 0, position, imgWidth, imgHeight);
                        heightLeft -= pageHeight;
                    }

                    pdf.save(`${(viewingReport || formData).namaProgram || "Laporan"}_SOLE.pdf`);
                    showStatus("PDF dimuat turun");
                } catch (e) { 
                    console.error(e);
                    showStatus("Ralat PDF", "error"); 
                }
            };

            const handleDriveUpload = async () => {
                if (!window.html2canvas) return;
                try {
                    const area = document.getElementById('print-area');
                    area.style.display = 'block';
                    area.style.position = 'fixed';
                    area.style.left = '0'; area.style.top = '0';
                    area.style.opacity = '1'; area.style.zIndex = '99999';
                    area.style.backgroundColor = '#ffffff';
                    await new Promise(r => setTimeout(r, 800));
                    const canvas = await window.html2canvas(area, { scale: 1.5, useCORS: true, backgroundColor: "#ffffff" });
                    area.style.display = 'none';
                    const base64 = canvas.toDataURL('image/jpeg', 0.7); 
                    await fetch(WEB_APP_URL, {
                        method: "POST",
                        body: JSON.stringify({ fileData: base64, fileName: `${(viewingReport || formData).namaProgram || "Laporan"}_SOLE.jpg`, mimeType: "image/jpeg", category: (viewingReport || formData).kategori, staffName: (viewingReport || formData).disediakanOleh })
                    });
                } catch (e) { console.error("Drive error:", e); }
            };

            const handleSaveReport = async () => {
                if (!formData.namaProgram || !formData.tarikhDari) return showStatus("Tajuk & Tarikh diperlukan!", "error");
                if (!user || !db) return showStatus("Cloud sync belum sedia...", "error");
                setIsSaving(true);
                const { collection, addDoc, doc, updateDoc, serverTimestamp } = window.FirebaseReady;
                try {
                    const payload = { ...formData, images, updatedAt: serverTimestamp() };
                    if (editingId) { await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'reports', editingId), payload); }
                    else { await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'reports'), { ...payload, createdAt: serverTimestamp(), userId: user.uid }); }
                    showStatus("Laporan disimpan ke Cloud & Drive!", "success");
                    await handleDriveUpload();
                    cancelEdit();
                    setActiveTab('archive');
                } catch (e) { showStatus("Ralat Simpan: " + e.message, "error"); }
                setIsSaving(false);
            };

            const deleteReport = async (id) => {
                if (!confirm("Padam laporan ini secara kekal?")) return;
                const { doc, deleteDoc } = window.FirebaseReady;
                try { await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'reports', id)); showStatus("Rekod dipadam", "success"); } catch (e) { showStatus("Gagal dipadam", "error"); }
            };

            const handleInputChange = (e) => {
                const { name, value } = e.target;
                setFormData(prev => {
                    const next = { ...prev, [name]: value };
                    if (name === 'kategori') { 
                        next.jawatanPenyedia = getDefaultJawatan(value); 
                        next.disediakanOleh = ''; 
                    }
                    return next;
                });
            };

            const handleImageUpload = async (index, e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = async (ev) => {
                        const compressed = await compressImage(ev.target.result);
                        setImages(prev => { const n = [...prev]; n[index] = compressed; return n; }); 
                    };
                    reader.readAsDataURL(file);
                }
            };

            const addImageSlot = () => setImages(prev => [...prev, null]);
            const removeImageSlot = (idx) => {
                setImages(prev => {
                    const type = formData.reportType;
                    if (type === 'opr') { const n = [...prev]; n[idx] = null; return n; }
                    else { return prev.filter((_, i) => i !== idx); }
                });
            };

            const handleTabChange = (tab) => {
                setActiveTab(tab);
                setViewingReport(null);
                setIsSidebarOpen(false);
                const newType = (tab === 'laporan_eksekutif' || tab === 'Executive Report') ? 'eksekutif' : 'opr';
                setFormData(prev => ({ ...prev, reportType: newType }));
                if (newType === 'opr' && images.length !== 4) setImages([null, null, null, null]);
            };

            const cancelEdit = () => { setFormData({...INITIAL_FORM}); setImages([null, null, null, null]); setEditingId(null); };
            const handleEdit = (r) => { setFormData({...r}); setImages(r.images || [null, null, null, null]); setEditingId(r.id); setActiveTab(r.reportType === 'eksekutif' ? 'laporan_eksekutif' : 'editor'); setViewingReport(null); };

            const availableYears = useMemo(() => {
                const years = new Set();
                reports.forEach(r => { if (r.tarikhDari) years.add(r.tarikhDari.split('-')[0]); });
                return Array.from(years).sort((a, b) => b - a);
            }, [reports]);

            const filteredReports = useMemo(() => {
                return reports.filter(r => {
                    const matchSearch = r.namaProgram?.toLowerCase().includes(searchQuery.toLowerCase());
                    const matchUnit = archiveFilterUnit === 'ALL' || r.kategori === archiveFilterUnit;
                    const matchPerson = archiveFilterPerson === 'ALL' || r.disediakanOleh === archiveFilterPerson;
                    const matchType = archiveFilterType === 'ALL' || r.reportType === archiveFilterType;
                    const reportYear = r.tarikhDari?.split('-')[0];
                    const matchYear = archiveFilterYear === 'ALL' || reportYear === archiveFilterYear;
                    const matchDateStart = !archiveFilterDateStart || r.tarikhDari >= archiveFilterDateStart;
                    const matchDateEnd = !archiveFilterDateEnd || r.tarikhDari <= archiveFilterDateEnd;
                    return matchSearch && matchUnit && matchPerson && matchType && matchYear && matchDateStart && matchDateEnd;
                });
            }, [reports, archiveFilterUnit, archiveFilterPerson, archiveFilterType, archiveFilterYear, archiveFilterDateStart, archiveFilterDateEnd, searchQuery]);

            const stats = useMemo(() => {
                const filtered = reports.filter(r => {
                    const matchUnit = anaFilterUnit === 'ALL' || r.kategori === anaFilterUnit;
                    const matchType = anaFilterType === 'ALL' || r.reportType === anaFilterType;
                    const matchPerson = anaFilterPerson === 'ALL' || r.disediakanOleh === anaFilterPerson;
                    return matchUnit && matchType && matchPerson;
                });
                const total = filtered.length;
                const oprCount = filtered.filter(r => r.reportType === 'opr').length;
                const execCount = filtered.filter(r => r.reportType === 'eksekutif').length;
                const unitCounts = {}; CATEGORIES_LIST.forEach(c => unitCounts[c.id] = 0);
                filtered.forEach(r => { if (unitCounts[r.kategori] !== undefined) unitCounts[r.kategori]++; });
                const personCounts = {}; filtered.forEach(r => { if (r.disediakanOleh) personCounts[r.disediakanOleh] = (personCounts[r.disediakanOleh] || 0) + 1; });
                const ranking = Object.entries(personCounts).sort((a, b) => b[1] - a[1]).slice(0, 5).map(([name, count]) => ({ name, count }));
                return { total, oprCount, execCount, unitCounts, ranking };
            }, [reports, anaFilterUnit, anaFilterType, anaFilterPerson]);

            const updateStaffList = async (unitId, newStaffArray) => {
                const newStaffData = { ...sysConfig.staffData, [unitId]: newStaffArray };
                setSysConfig(prev => ({ ...prev, staffData: newStaffData }));
            };

            if (isDbConnecting) {
                return (
                    <div className="h-screen w-screen flex flex-col items-center justify-center bg-[#0f172a] text-white">
                        <div className="w-12 h-12 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin mb-4"></div>
                        <p className="text-[10px] font-black uppercase tracking-widest text-center">Cloud Synchronizing...</p>
                    </div>
                );
            }

            return (
                <React.Fragment>
                    <div id="root-ui" className="flex flex-col h-full w-full bg-[#f8fafc] relative overflow-hidden">
                        
                        <header className="md:hidden bg-slate-900 text-white p-4 flex items-center justify-between z-50">
                            <div className="flex items-center gap-3">
                                <Sparkles size={24} className="text-indigo-400" />
                                <h1 className="text-xl font-black tracking-tighter leading-none">SOLE-system</h1>
                            </div>
                            <button onClick={() => setIsSidebarOpen(!isSidebarOpen)} className="p-2 bg-slate-800 rounded-lg">
                                {isSidebarOpen ? <X size={24}/> : <Menu size={24}/>}
                            </button>
                        </header>

                        <div className="flex flex-1 overflow-hidden relative">
                            <aside className={`fixed inset-y-0 left-0 z-40 w-64 bg-slate-900 text-slate-300 flex flex-col shadow-2xl transition-transform duration-300 md:relative md:translate-x-0 ${isSidebarOpen ? 'sidebar-open' : 'sidebar-closed'}`}>
                                <div className="p-8 bg-slate-950 flex flex-col gap-4 text-center mobile-hide">
                                    <div className="mx-auto bg-indigo-600 w-12 h-12 rounded-2xl flex items-center justify-center shadow-lg transform -rotate-3">
                                        <Sparkles size={24} className="text-white" />
                                    </div>
                                    <h1 className="text-2xl font-black text-white tracking-tighter uppercase leading-none mt-2">SOLE-system</h1>
                                    <p className="text-[7px] text-slate-400 font-bold uppercase leading-tight">(Sistem OPR & Laporan Eksekutif Sektor Pembelajaran PPD Ranau)</p>
                                </div>
                                <nav className="flex-1 py-8 px-4 space-y-3 overflow-y-auto scrollbar-hide text-left">
                                    <button onClick={() => handleTabChange('editor')} className={`w-full flex items-center gap-3 p-4 rounded-xl transition-all text-xs font-bold uppercase tracking-wider ${activeTab === 'editor' && !viewingReport ? 'bg-indigo-600 text-white shadow-xl translate-x-1' : 'hover:bg-slate-800'}`}><Layout size={18}/> One Page Report</button>
                                    <button onClick={() => handleTabChange('laporan_eksekutif')} className={`w-full flex items-center gap-3 p-4 rounded-xl transition-all text-xs font-bold uppercase tracking-wider ${activeTab === 'laporan_eksekutif' ? 'bg-indigo-600 text-white shadow-xl translate-x-1' : 'hover:bg-slate-800'}`}><Flag size={18}/> Executive Report</button>
                                    <button onClick={() => handleTabChange('archive')} className={`w-full flex items-center gap-3 p-4 rounded-xl transition-all text-xs font-bold uppercase tracking-wider ${activeTab === 'archive' ? 'bg-indigo-600 text-white shadow-xl translate-x-1' : 'hover:bg-slate-800'}`}><Library size={18}/> Database Archive</button>
                                    <button onClick={() => handleTabChange('analisis')} className={`w-full flex items-center gap-3 p-4 rounded-xl transition-all text-xs font-bold uppercase tracking-wider ${activeTab === 'analisis' ? 'bg-indigo-600 text-white shadow-xl translate-x-1' : 'hover:bg-slate-800'}`}><BarChart2 size={18}/> Analysis</button>
                                    <div className="pt-8 opacity-20"><div className="h-px bg-slate-700 mx-4"></div></div>
                                    <button onClick={() => handleTabChange('settings')} className={`w-full flex items-center gap-3 p-4 rounded-xl transition-all text-xs font-bold uppercase tracking-wider ${activeTab === 'settings' ? 'bg-indigo-600 text-white' : 'hover:bg-slate-800'}`}><Settings size={18}/> System Config</button>
                                </nav>
                                <div className="p-6 text-center mt-auto">
                                    <p className="text-[9px] font-black uppercase tracking-widest text-indigo-400/60 bg-indigo-950/30 py-2 rounded-xl border border-indigo-500/10 text-center font-bold">System Developed By : YapShell</p>
                                </div>
                            </aside>

                            <main className="flex-1 h-full overflow-y-auto bg-[#f8fafc] p-4 md:p-12 relative">
                                <div className="max-w-6xl mx-auto w-full pb-24">
                                    {activeTab === 'analisis' && (
                                        <div className="space-y-10 fade-in">
                                            <div className="bg-white p-6 md:p-10 rounded-[2.5rem] shadow-sm border border-slate-100 flex flex-col md:flex-row justify-between items-start md:items-center gap-6">
                                                <div>
                                                    <h2 className="text-2xl md:text-4xl font-black text-slate-900 tracking-tighter uppercase">Analysis Dashboard</h2>
                                                    <p className="text-slate-500 text-[10px] font-bold uppercase mt-2 tracking-widest">Real-time Metrics & Statistics</p>
                                                </div>
                                                <div className="flex flex-wrap gap-2">
                                                    <select value={anaFilterUnit} onChange={e => setAnaFilterUnit(e.target.value)} className="p-2 bg-slate-50 border rounded-xl text-[10px] font-black uppercase outline-none shadow-inner"><option value="ALL">All Units</option>{CATEGORIES_LIST.map(c => <option key={c.id} value={c.id}>{c.label}</option>)}</select>

                                                        <h4 className="text-[11px] font-black uppercase text-indigo-600 tracking-widest flex items-center gap-2 mb-4"><Users size={16}/> Staff Management</h4>
                                                        <div className="space-y-4 max-h-[400px] overflow-y-auto pr-2 scrollbar-hide">
                                                            {CATEGORIES_LIST.map(unit => (<div key={unit.id} className="bg-white p-4 rounded-2xl border border-slate-100 shadow-sm"><p className="text-[9px] font-black text-slate-400 uppercase mb-3">{unit.label}</p><div className="space-y-2">{(sysConfig.staffData[unit.id] || []).map((name, idx) => (<div key={idx} className="flex justify-between items-center group"><span className="text-[10px] font-bold text-slate-700">{name}</span><button onClick={() => { const newList = sysConfig.staffData[unit.id].filter((_, i) => i !== idx); updateStaffList(unit.id, newList); }} className="p-1 text-rose-400 hover:text-rose-600"><Trash size={14}/></button></div>))}<div className="pt-3 flex gap-2"><input type="text" placeholder="Add Name..." id={`add-staff-${unit.id}`} className="flex-grow bg-slate-50 border rounded-lg px-2 py-1.5 text-[10px] font-bold outline-none" /><button onClick={() => { const input = document.getElementById(`add-staff-${unit.id}`); if(input.value.trim()){ const newList = [...(sysConfig.staffData[unit.id] || []), input.value.trim()]; updateStaffList(unit.id, newList); input.value = ''; } }} className="bg-indigo-600 text-white p-1.5 rounded-lg"><Plus size={14}/></button></div></div></div>))}
                                                        </div>
                                                    </div>
                                                </div>
                                                <button onClick={async () => { 
                                                    if (!user || !db) return showStatus("Sync not ready", "error");
                                                    const { doc, setDoc } = window.FirebaseReady; 
                                                    const configDoc = doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'global_config'); 
                                                    await setDoc(configDoc, sysConfig); 
                                                    showStatus("Configuration saved to Cloud!"); 
                                                }} className="w-full mt-10 py-5 bg-indigo-600 text-white rounded-3xl font-black text-xs uppercase tracking-widest shadow-lg hover:bg-indigo-700 transition-all">Save All Settings</button>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            </main>
                        </div>
                    </div>

                    <div id="print-area">
                        {(viewingReport || formData).reportType === 'eksekutif' ? (
                            <ExecDoc data={viewingReport || formData} reportImages={viewingReport ? viewingReport.images : images} config={sysConfig} />
                        ) : (
                            <ReportDoc data={viewingReport || formData} reportImages={(viewingReport ? viewingReport.images : images).slice(0, 4)} config={sysConfig} />
                        )}
                    </div>
                    
                    {statusMsg && (
                        <div className={`fixed bottom-10 right-4 md:right-10 z-[100] flex items-center gap-5 px-6 md:px-10 py-4 md:py-6 rounded-2xl md:rounded-[2.5rem] shadow-2xl border backdrop-blur-xl animate-in fade-in slide-in-from-bottom-10 ${statusMsg.type === 'error' ? 'bg-rose-50/90 border-rose-200 text-rose-800' : 'bg-emerald-50/90 border-emerald-200 text-emerald-800'}`}>
                            <span className="font-black text-[10px] md:text-xs uppercase tracking-widest">{statusMsg.text}</span>
                        </div>
                    )}
                </React.Fragment>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
